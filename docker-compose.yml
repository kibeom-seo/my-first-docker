services:
  gateway:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    networks: ["my-net"]
    depends_on: ["web-node"]

  web-node:
    build: .
    deploy:
      replicas: 3
    environment:
      - REDIS_HOST=my-redis
      - KAFKA_BROKER=my-kafka:29092
    networks: ["my-net"]
    depends_on: ["my-redis", "my-kafka"]

  my-redis:
    image: redis:alpine
    networks: ["my-net"]

  # [수정] Zookeeper를 제거하고 Kafka를 KRaft 모드로 단독 실행합니다.
  my-kafka:
    image: apache/kafka:latest
    container_name: my-kafka
    ports: ["9092:9092"]
    environment:
      # KRaft 필수 설정 (Exception 해결 핵심)
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      
      # 리스너 설정 (내부 web-node는 29092, 외부 내 PC는 9092)
      - KAFKA_LISTENERS=PLAINTEXT://:9092,PLAINTEXT_INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://my-kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT_INTERNAL
      
      # 기타 필수 설정
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CLUSTER_ID=62V_S7_mS_m5_N_R_X_L_Q
      - KAFKA_HEAP_OPTS=-Xmx512M -Xms512M
    networks: ["my-net"]

networks:
  my-net:
    driver: bridge